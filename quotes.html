<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspirational Library Quotes — Bibliothèque Explorer</title>
    <!-- CSS stylesheets -->
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
  </head>
  <body>
    <!-- Navigation Bar Header Placeholder -->
    <header id="navbar-placeholder"></header>

    <main class="main-content">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Compiled Philosophical Quotes</h2>
          <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;" id="quotes-count-indicator">
            Showing all quotes
          </span>
        </div>

        <!-- Filter / Search Controls -->
        <div class="filter-bar slide-up">
          <div class="search-input-wrapper" style="min-width: 100%;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="Search by quote keyword, book title, or thinker name..." class="search-bar-input" id="quotes-search-input" />
          </div>
        </div>

        <!-- Category Pill Rail -->
        <div class="category-pills slide-up" id="quotes-categories-rail">
          <!-- Dynamic category filters -->
        </div>

        <!-- Quotes Grid -->
        <div class="quotes-grid" id="catalog-quotes-grid" style="grid-template-columns: 1fr; gap: 2rem;">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </main>

    <!-- Footer placeholder -->
    <footer id="footer-placeholder"></footer>

    <!-- JS rendering controller -->
    <script type="module">
      import { renderQuotesPage } from './js/app.js';
      document.addEventListener('DOMContentLoaded', () => {
        renderQuotesPage();
      });
    </script>
  </body>
</html>

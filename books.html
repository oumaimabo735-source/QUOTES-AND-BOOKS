<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog & Thinkers — Bibliothèque Explorer</title>
    <!-- CSS stylesheets -->
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
  </head>
  <body>
    <!-- Navigation Bar Header Placeholder -->
    <header id="navbar-placeholder"></header>

    <main class="main-content">
      <div class="container">
        <!-- Tab Selector (Books vs Authors) -->
        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem;" class="slide-up">
          <button class="btn btn-primary" id="tab-books-toggle" style="border-radius: 30px; padding: 0.6rem 2rem;">
            📚 Browse Masterpieces
          </button>
          <button class="btn btn-secondary" id="tab-authors-toggle" style="border-radius: 30px; padding: 0.6rem 2rem;">
            🖋 Historical Authors
          </button>
        </div>

        <!-- 1. BOOKS BROWSER INTERFACE -->
        <div id="books-browser-section">
          <div class="section-header">
            <h2 class="section-title">Explore Classic Works</h2>
            <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;" id="books-count-indicator">
              Showing all books
            </span>
          </div>

          <!-- Filter / Search Controls -->
          <div class="filter-bar slide-up">
            <div class="search-input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" placeholder="Search title, author, keyword..." class="search-bar-input" id="books-search-input" />
            </div>

            <div class="filter-group">
              <select class="select-filter" id="books-sort-select">
                <option value="default">Sort by: Relevancy</option>
                <option value="rating-desc">Rating: Highest First</option>
                <option value="year-desc">Year: Newest First</option>
                <option value="year-asc">Year: Oldest First</option>
                <option value="title-asc">Title: A-Z</option>
                <option value="title-desc">Title: Z-A</option>
              </select>
            </div>
          </div>

          <!-- Category Pill Rail -->
          <div class="category-pills slide-up" id="books-categories-rail">
            <!-- Dynamic category filters -->
          </div>

          <!-- Books Grid -->
          <div class="books-grid" id="catalog-books-grid">
            <!-- Loaded dynamically -->
          </div>
        </div>

        <!-- 2. AUTHORS BROWSER INTERFACE -->
        <div id="authors-browser-section" style="display: none;">
          <div class="section-header">
            <h2 class="section-title">Historic Authors & Philosophers</h2>
            <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;" id="authors-count-indicator">
              Showing all thinkers
            </span>
          </div>

          <!-- Author Search bar -->
          <div class="filter-bar slide-up" style="margin-bottom: 2.5rem;">
            <div class="search-input-wrapper" style="min-width: 100%;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" placeholder="Search by author name, nationality, or biography..." class="search-bar-input" id="authors-search-input" />
            </div>
          </div>

          <!-- Authors Grid -->
          <div class="authors-grid" id="catalog-authors-grid">
            <!-- Loaded dynamically -->
          </div>
        </div>

      </div>
    </main>

    <!-- Footer placeholder -->
    <footer id="footer-placeholder"></footer>

    <!-- JS rendering controller -->
    <script type="module">
      import { renderBooksPage } from './js/app.js';
      document.addEventListener('DOMContentLoaded', () => {
        renderBooksPage();
      });
    </script>
  </body>
</html>
